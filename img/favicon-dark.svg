<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <style>
    @keyframes pulse { 0%,100%{opacity:1;r:4px} 50%{opacity:.25;r:2.5px} }
    .dot { animation: pulse 2.2s ease-in-out infinite; }
  </style>
  <rect x="3" y="3" width="26" height="26" rx="6" ry="6"
        fill="#060810" stroke="#00D9F5" stroke-width="1.5"/>
  <circle class="dot" cx="16" cy="16" r="4" fill="#00D9F5"
          style="filter:drop-shadow(0 0 4px #00D9F5);"/>
</svg>